name: iPhone Price Checker

on:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run script
        run: python price_check.py